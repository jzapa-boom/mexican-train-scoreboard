<html lang="en">

  const firebaseConfig = {
    apiKey: "AIzaSyC9KM7AL-fU-4m3jgCNozJw9nJfo3R6ZfE",

    databaseURL: "https://mexican-train-24ffd-default-rtdb.firebaseio.com",
    projectId: "mexican-train-24ffd",

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

// Wait for Firebase then mount
function waitForFb(cb) {
  if (window.__fbReady) { cb(); return; }
  document.addEventListener("fbReady", cb, { once: true });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let c = "";
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

// ── Palette ────────────────────────────────────────────────────────────────
const C = {
  sky:"#70D6FF", pink:"#FF70A6", coral:"#FF9770",
  gold:"#FFD670", lime:"#E9FF70", teal:"#2EC4B6",
  dark:"#1A1A2A", muted:"#888", bg:"#F2F4F8",
};

// ── Pip layouts ────────────────────────────────────────────────────────────
const PIPS = {
  0:[],
  1:[[50,50]],
  2:[[32,32],[68,68]],
  3:[[32,32],[50,50],[68,68]],
  4:[[30,30],[70,30],[30,70],[70,70]],
  5:[[30,30],[70,30],[50,50],[30,70],[70,70]],
  6:[[22,30],[50,30],[78,30],[22,70],[50,70],[78,70]],
  7:[[22,18],[22,50],[22,82],[50,50],[78,18],[78,50],[78,82]],
  8:[[22,18],[50,18],[78,18],[22,50],[78,50],[22,82],[50,82],[78,82]],
  9:[[22,22],[50,22],[78,22],[22,50],[50,50],[78,50],[22,78],[50,78],[78,78]],
  10:[[18,18],[18,40],[18,60],[18,82],[50,18],[50,82],[82,18],[82,40],[82,60],[82,82]],
  11:[[18,18],[18,40],[18,60],[18,82],[50,18],[50,50],[50,82],[82,18],[82,40],[82,60],[82,82]],
  12:[[22,13],[50,13],[78,13],[22,37],[50,37],[78,37],[22,63],[50,63],[78,63],[22,87],[50,87],[78,87]],
};
const PIP_COLOR = ["#1a1a1a","#000000","#7F191D","#FDE903","#747474","#3B5F24","#292875","#FBD283","#FE0005","#1B3166","#FF7E03","#2F6E29","#FF0013"];
const AVATAR_BG = [C.sky,C.pink,C.coral,C.gold,C.lime,C.teal,"#b388ff","#ff8a65"];

// ── Icons ──────────────────────────────────────────────────────────────────
function IconFinger({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 1200 1200" fill={color} style={{display:"block",flexShrink:0}}><path d="M775,725h-100v-296c0-48.2-39.2-87.5-87.5-87.5s-87.5,39.2-87.5,87.5v501.5l-56.5-65c-17.2-20-42.2-31.7-68.8-32.8-26.5-1-52.3,9.2-70.7,28-35.5,35.5-37.3,92.8-4.3,130.5l131.5,150.5c5,5.8,11.8,8.5,18.8,8.5s11.8-2,16.5-6.2c10.5-9,11.5-25,2.2-35.2l-131.5-150.5c-15.8-18-14.8-45.2,2-62,9-9,21-13.5,33.8-13.3,12.8.5,24.2,6,32.8,15.5l100.5,115.3c6.7,8,18,10.7,27.5,7,9.8-3.8,16.3-13,16.3-23.5V429c0-20.8,16.7-37.5,37.5-37.5s37.5,16.7,37.5,37.5v321c0,13.7,11.2,25,25,25h125c96.5,0,175,78.5,175,175v175c0,13.7,11.2,25,25,25s25-11.2,25-25v-175c0-124-101-225-225-225h0z"/></svg>;}
function IconCamera({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;}
function IconGrid({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>;}
function IconRefresh({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>;}
function IconTrain({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><rect x="4" y="3" width="16" height="13" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="M8 19l-2 3"/><path d="M18 22l-2-3"/><path d="M7 19h10"/><circle cx="8.5" cy="15.5" r="1.5" fill={color} stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill={color} stroke="none"/></svg>;}
function IconTrophy({size=16,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><polyline points="8 6 3 6 3 13 8 13"/><polyline points="16 6 21 6 21 13 16 13"/><path d="M12 17c-3.3 0-6-2.7-6-6V6h12v5c0 3.3-2.7 6-6 6z"/><path d="M12 17v4"/><path d="M9 21h6"/></svg>;}
function IconUsers({size=20,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;}
function IconCopy({size=18,color="currentColor"}){return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;}

// ── Components ─────────────────────────────────────────────────────────────
function Domino({value,size=80,selected=false,count=0,onClick}){
  const pips=PIPS[value]??[];
  const pc=PIP_COLOR[value]??"#222";
  const isBlank=value===0;
  const r=Math.max(5,size*0.1);
  return(
    <div onClick={onClick} style={{position:"relative",display:"inline-block",cursor:onClick?"pointer":"default",WebkitUserSelect:"none",userSelect:"none"}}>
      <div style={{width:size,height:size,borderRadius:size*0.14,background:selected?(isBlank?"#fff8e1":"#fffaf0"):"#fff",border:`3px solid ${selected?(isBlank?C.gold:pc):"#e4e4e4"}`,boxShadow:selected?`0 0 0 3px ${isBlank?C.gold:pc}44, 0 6px 20px ${isBlank?C.gold:pc}28`:"0 2px 8px rgba(0,0,0,0.07)",display:"flex",alignItems:"center",justifyContent:"center",transition:"transform 0.12s, box-shadow 0.12s",transform:selected?"scale(1.06)":"scale(1)",minWidth:44,minHeight:44}}>
        {isBlank
          ?<svg width={size*0.84} height={size*0.84} viewBox="0 0 100 100"><line x1="20" y1="50" x2="80" y2="50" stroke="#bbb" strokeWidth="8" strokeLinecap="round"/></svg>
          :<svg width={size*0.84} height={size*0.84} viewBox="0 0 100 100">{pips.map(([cx,cy],i)=><circle key={i} cx={cx} cy={cy} r={r} fill={pc}/>)}</svg>
        }
      </div>
      {count>0&&<div style={{position:"absolute",top:-9,right:-9,width:24,height:24,borderRadius:"50%",background:C.coral,color:"#fff",fontSize:13,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.25)",border:"2px solid #fff"}}>{count}</div>}
    </div>
  );
}

function Avatar({name,idx=0,size=38}){
  return<div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:AVATAR_BG[idx%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",color:C.dark,fontWeight:900,fontSize:Math.round(size*0.36),fontFamily:"'Fredoka One',cursive",border:"2.5px solid rgba(255,255,255,0.55)",boxShadow:"0 2px 8px rgba(0,0,0,0.13)"}}>{(name||"?").slice(0,2).toUpperCase()}</div>;
}

function Badge({label,bg=C.sky}){
  return<span style={{background:bg,color:C.dark,borderRadius:50,padding:"3px 9px",fontSize:11,fontWeight:800,fontFamily:"'Nunito',sans-serif",letterSpacing:0.3,whiteSpace:"nowrap"}}>{label}</span>;
}

const btnStyle=(bg,extra={})=>({background:bg,color:"#fff",border:"none",borderRadius:16,padding:"15px 28px",fontSize:16,fontWeight:800,fontFamily:"'Nunito',sans-serif",cursor:"pointer",WebkitAppearance:"none",minHeight:48,...extra});

function Screen({children,style={}}){
  return<div style={{minHeight:"100dvh",paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)",paddingLeft:"env(safe-area-inset-left)",paddingRight:"env(safe-area-inset-right)",fontFamily:"'Nunito',sans-serif",overflowX:"hidden",...style}}>{children}</div>;
}

function BottomBar({children}){
  return<div style={{position:"sticky",bottom:0,paddingBottom:"calc(12px + env(safe-area-inset-bottom))",paddingTop:12,paddingLeft:"max(14px, env(safe-area-inset-left))",paddingRight:"max(14px, env(safe-area-inset-right))",background:"rgba(242,244,248,0.97)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderTop:"1px solid rgba(0,0,0,0.05)",boxSizing:"border-box",width:"100%"}}>{children}</div>;
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]           = useState("splash");
  const [setupPlayers,setSetupPlayers] = useState([{name:""},{name:""}]);
  const [setupPip,setSetupPip]       = useState(12);
  const [setupRounds,setSetupRounds] = useState("all");
  const [gameCode,setGameCode]       = useState("");
  const [myName,setMyName]           = useState("");
  const [gameData,setGameData]       = useState(null);
  const [joinInput,setJoinInput]     = useState("");
  const [joinError,setJoinError]     = useState("");
  const [selected,setSelected]       = useState({});
  const [cameraMode,setCameraMode]   = useState(false);
  const [cameraScore,setCameraScore] = useState(null);
  const [cameraLoading,setCameraLoading] = useState(false);
  const [cameraError,setCameraError] = useState(null);
  const [copied,setCopied]           = useState(false);
  const [editingRound,setEditingRound] = useState(null); // pip value of round being edited, or null
  const fileRef = useRef();

  const fb = ()=>window.__fb;

  // Live sync
  useEffect(()=>{
    if(!gameCode) return;
    const unsub = fb().onValue(fb().ref(fb().db,`games/${gameCode}`), snap=>{
      if(snap.exists()){
        const data=snap.val();
        setGameData(data);
        if(data.status==="done" && screen!=="gameover" && screen!=="fullboard") setScreen("gameover");
      }
    });
    return()=>unsub();
  },[gameCode]);

  // Derived
  const startPip     = gameData?.startPip??12;
  const currentRound = gameData?.currentRound??startPip;
  const players      = gameData?.players??[];
  const scores       = gameData?.scores??{};
  const getTotal     = n=>Object.values(scores[n]??{}).reduce((a,b)=>a+(b||0),0);
  const getWins      = n=>Object.values(scores[n]??{}).filter(s=>s===0).length;
  const getRound     = (n,pip)=>scores[n]?.[String(startPip-pip)]??null;
  const ranked       = ()=>[...players].sort((a,b)=>getTotal(a)-getTotal(b));
  const roundIdx     = startPip-currentRound;

  async function createGame(){
    const names=setupPlayers.map(p=>p.name.trim()).filter(Boolean);
    if(names.length<2) return;
    const code=genCode();
    const initScores={};
    names.forEach(n=>initScores[n]={});
    // Build the ordered list of rounds to play
    let allRounds=Array.from({length:setupPip+1},(_,i)=>setupPip-i); // [12,11,...,0]
    if(setupRounds==="even") allRounds=allRounds.filter(r=>r%2===0);
    else if(setupRounds==="odd") allRounds=allRounds.filter(r=>r%2!==0);
    await fb().set(fb().ref(fb().db,`games/${code}`),{
      startPip:setupPip,
      currentRound:allRounds[0],
      roundsList:allRounds,
      roundsMode:setupRounds,
      status:"active",players:names,
      scores:initScores,createdAt:Date.now(),
    });
    setGameCode(code);
    setScreen("pickname");
  }

  async function lookupGame(){
    const code=joinInput.toUpperCase().trim();
    if(code.length!==4){setJoinError("Enter the 4-letter game code");return;}
    const snap=await fb().get(fb().ref(fb().db,`games/${code}`));
    if(!snap.exists()){setJoinError("Game not found — check the code");return;}
    const data=snap.val();
    if(data.status==="done"){setJoinError("That game has already ended");return;}
    setGameData(data);
    setGameCode(code);
    setJoinError("");
    setScreen("pickname");
  }

  async function submitScore(score){
    const targetRound = editingRound !== null ? editingRound : currentRound;
    const ridx=String(startPip-targetRound);
    const updates={};
    updates[`games/${gameCode}/scores/${myName}/${ridx}`]=score;
    // Only check for round advancement when submitting a fresh score (not editing a past round)
    if(editingRound===null){
      const allDone=players.every(p=>p===myName?true:scores[p]?.[ridx]!=null);
      if(allDone){
        const roundsList=gameData?.roundsList??[];
        const currentIdx=roundsList.indexOf(currentRound);
        const nextRound=roundsList[currentIdx+1];
        if(nextRound!=null) updates[`games/${gameCode}/currentRound`]=nextRound;
        else updates[`games/${gameCode}/status`]="done";
      }
    }
    await fb().update(fb().ref(fb().db),updates);
    setSelected({});setCameraScore(null);setEditingRound(null);
    setScreen("scorecard");
  }

  function calcScore(){
    return Object.entries(selected).reduce((s,[v,c])=>{
      const pipVal=Number(v)===0?50:Number(v);
      return s+pipVal*c;
    },0);
  }

  function toggleDomino(val){
    setSelected(prev=>({...prev,[val]:(prev[val]||0)>=13?0:(prev[val]||0)+1}));
  }

  async function handlePhoto(e){
    const file=e.target.files?.[0];
    if(!file) return;
    setCameraLoading(true);setCameraError(null);setCameraScore(null);
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      const resp=await fetch("/.netlify/functions/analyze-pips",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({imageData:base64,mimeType:file.type}),
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||"bad");
      const n=parseInt(data.count??"");
      if(isNaN(n)) throw new Error("bad");
      setCameraScore(n);
    }catch{
      setCameraError("Couldn't count pips — try a clearer photo");
    }finally{
      setCameraLoading(false);
      e.target.value="";
    }
  }

  function copyCode(){
    navigator.clipboard?.writeText(gameCode).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  }

  // ── SPLASH ─────────────────────────────────────────────────────────────────
  if(screen==="splash") return(
    <Screen style={{background:`linear-gradient(160deg, ${C.dark} 0%, #2a1a3a 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
      <div style={{position:"relative",width:90,height:90,marginBottom:24}}>
        <div style={{position:"absolute",inset:0,borderRadius:22,background:`linear-gradient(135deg, ${C.coral}, ${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
            <rect x="8" y="8" width="84" height="84" rx="12" fill="none" stroke="#fff" strokeWidth="6"/>
            <line x1="50" y1="8" x2="50" y2="92" stroke="#fff" strokeWidth="4"/>
            <circle cx="27" cy="32" r="8" fill={C.coral}/>
            <circle cx="27" cy="54" r="8" fill={C.coral}/>
            <circle cx="27" cy="76" r="8" fill={C.coral}/>
            <circle cx="73" cy="36" r="8" fill={C.pink}/>
            <circle cx="73" cy="70" r="8" fill={C.pink}/>
          </svg>
        </div>
      </div>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"clamp(32px,9vw,48px)",color:"#fff",lineHeight:1,marginBottom:8}}>Mexican Train</div>
      <div style={{color:"rgba(255,255,255,0.4)",fontSize:"clamp(11px,3vw,14px)",letterSpacing:3,textTransform:"uppercase",marginBottom:48}}>Dominoes Scorekeeper</div>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
        <button onClick={()=>setScreen("setup")} style={{...btnStyle(`linear-gradient(135deg, ${C.coral}, ${C.pink})`),fontSize:18,padding:"18px",borderRadius:50,letterSpacing:1,boxShadow:`0 8px 32px ${C.pink}55`,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
          <IconTrain size={22} color="#fff"/> New Game
        </button>
        <button onClick={()=>setScreen("join")} style={{...btnStyle("rgba(255,255,255,0.12)"),fontSize:18,padding:"18px",borderRadius:50,letterSpacing:1,border:"2px solid rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
          <IconUsers size={22} color="#fff"/> Join Game
        </button>
      </div>
      <div style={{display:"flex",borderRadius:50,overflow:"hidden",marginTop:48,boxShadow:"0 4px 20px rgba(0,0,0,0.35)"}}>
        {[C.sky,C.pink,C.coral,C.gold,C.lime,C.teal].map((c,i)=>(
          <div key={i} style={{width:36,height:10,background:c}}/>
        ))}
      </div>
    </Screen>
  );

  // ── JOIN ───────────────────────────────────────────────────────────────────
  if(screen==="join") return(
    <Screen style={{background:C.bg}}>
      <div style={{background:`linear-gradient(135deg, ${C.teal}, ${C.sky})`,padding:"calc(env(safe-area-inset-top) + 20px) 20px 56px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",bottom:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.12)"}}/>
        <button onClick={()=>setScreen("splash")} style={{background:"rgba(255,255,255,0.22)",border:"none",color:"#fff",width:40,height:40,borderRadius:"50%",fontSize:18,cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:30,color:"#fff"}}>Join a Game</div>
        <div style={{color:"rgba(255,255,255,0.75)",fontSize:14,marginTop:4}}>Enter the 4-letter code from your host</div>
      </div>
      <div style={{margin:"-26px 14px 0",background:"#fff",borderRadius:22,padding:"32px 20px 24px",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
        <input
          value={joinInput}
          onChange={e=>{setJoinInput(e.target.value.toUpperCase());setJoinError("");}}
          placeholder="ABCD"
          maxLength={4}
          style={{width:"100%",padding:"18px",borderRadius:16,border:`2.5px solid ${joinError?C.coral:C.sky}`,fontSize:32,fontFamily:"'Fredoka One',cursive",textAlign:"center",letterSpacing:12,outline:"none",color:C.dark,boxSizing:"border-box"}}
          onKeyDown={e=>e.key==="Enter"&&lookupGame()}
        />
        {joinError&&<div style={{color:C.coral,fontSize:13,fontWeight:700,textAlign:"center",marginTop:8}}>{joinError}</div>}
        <button onClick={lookupGame} style={{...btnStyle(`linear-gradient(135deg, ${C.teal}, ${C.sky})`),width:"100%",marginTop:16,fontSize:17,padding:"16px",borderRadius:50,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <IconUsers size={20} color="#fff"/> Find Game
        </button>
      </div>
    </Screen>
  );

  // ── SETUP ──────────────────────────────────────────────────────────────────
  if(screen==="setup"){
    const playerNames=setupPlayers.map(p=>p.name.trim()).filter(Boolean);
    const roundsPreview={
      all: setupPip===12?"12→11→…→0":setupPip===9?"9→8→…→0":"6→5→…→0",
      even: setupPip===12?"12,10,8,6,4,2,0":setupPip===9?"8,6,4,2,0":"6,4,2,0",
      odd: setupPip===12?"11,9,7,5,3,1":setupPip===9?"9,7,5,3,1":"5,3,1",
    };
    return(
      <Screen style={{background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${C.sky}, ${C.teal})`,padding:"calc(env(safe-area-inset-top) + 20px) 20px 56px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.12)"}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <button onClick={()=>setScreen("splash")} style={{background:"rgba(255,255,255,0.22)",border:"none",color:"#fff",width:40,height:40,borderRadius:"50%",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
            <button onClick={()=>setScreen("rules")} style={{background:"rgba(255,255,255,0.22)",border:"none",color:"#fff",borderRadius:50,padding:"8px 18px",fontSize:14,fontWeight:800,fontFamily:"'Nunito',sans-serif",cursor:"pointer"}}>📋 Rules</button>
          </div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:30,color:"#fff"}}>Game Setup</div>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:14,marginTop:4}}>Configure your game</div>
        </div>
        <div style={{margin:"-26px 14px 0",background:"#fff",borderRadius:22,padding:"32px 20px 20px",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>

          {/* Domino Set */}
          <div style={{fontWeight:800,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0,marginBottom:12}}>Domino Set</div>
          <div style={{display:"flex",gap:8,marginBottom:24}}>
            {[12,9,6].map(p=>{
              const pc=PIP_COLOR[p]??"#333",pips=PIPS[p]??[],active=setupPip===p;
              const tileH=38,r=Math.max(2,tileH*0.1);
              return(
                <button key={p} onClick={()=>setSetupPip(p)} style={{flex:1,padding:"10px 6px 8px",borderRadius:14,border:`2.5px solid ${active?pc:"#eee"}`,background:active?`${pc}14`:"#fafafa",cursor:"pointer",fontFamily:"'Nunito',sans-serif",minHeight:80,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:7}}>
                  <div style={{width:tileH*2,height:tileH,borderRadius:7,background:"#fff",border:`2px solid ${active?pc:"#ddd"}`,boxShadow:active?`0 2px 10px ${pc}33`:"0 1px 4px rgba(0,0,0,0.07)",display:"flex",alignItems:"stretch",overflow:"hidden"}}>
                    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width={tileH*0.82} height={tileH*0.82} viewBox="0 0 100 100">
                        {pips.map(([cx,cy],i)=><circle key={i} cx={cx} cy={cy} r={r*2.6} fill={pc}/>)}
                      </svg>
                    </div>
                    <div style={{width:2,background:active?`${pc}88`:"#ddd",flexShrink:0}}/>
                    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width={tileH*0.82} height={tileH*0.82} viewBox="0 0 100 100">
                        {pips.map(([cx,cy],i)=><circle key={i} cx={cx} cy={cy} r={r*2.6} fill={pc}/>)}
                      </svg>
                    </div>
                  </div>
                  <div style={{fontSize:12,fontWeight:800,color:active?pc:C.muted}}>Double-{p}</div>
                </button>
              );
            })}
          </div>

          {/* Rounds */}
          <div style={{fontWeight:800,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0,marginBottom:12}}>Rounds</div>
          <div style={{display:"flex",gap:8,marginBottom:6}}>
            {[["all","All","Full game"],["even","Evens","Shorter"],["odd","Odds","Shorter"]].map(([val,label,sub])=>{
              const active=setupRounds===val;
              return(
                <button key={val} onClick={()=>setSetupRounds(val)} style={{flex:1,padding:"12px 6px",borderRadius:14,border:`2.5px solid ${active?C.teal:"#eee"}`,background:active?`${C.teal}14`:"#fafafa",cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontWeight:800,fontSize:15,color:active?C.teal:C.dark}}>{label}</div>
                  <div style={{fontSize:11,color:C.muted}}>{sub}</div>
                </button>
              );
            })}
          </div>
          <div style={{fontSize:12,color:C.muted,marginBottom:24,padding:"8px 12px",background:"#f7f8fa",borderRadius:10,textAlign:"center"}}>
            Rounds: <strong style={{color:C.dark}}>{roundsPreview[setupRounds]}</strong>
          </div>

          {/* Players */}
          <div style={{fontWeight:800,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0,marginBottom:10}}>Players</div>
          {setupPlayers.map((p,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <Avatar name={p.name||"?"} idx={i} size={40}/>
              <input
                value={p.name}
                onChange={e=>setSetupPlayers(prev=>prev.map((pl,j)=>j===i?{...pl,name:e.target.value}:pl))}
                placeholder={`Player ${i+1}`}
                style={{flex:1,padding:"13px 16px",borderRadius:12,border:"2px solid #eee",fontSize:16,fontFamily:"'Nunito',sans-serif",outline:"none",minHeight:48,background:"#fff"}}
              />
              {setupPlayers.length>2&&(
                <button onClick={()=>setSetupPlayers(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#ccc",fontSize:22,cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              )}
            </div>
          ))}
          {setupPlayers.length<8&&(
            <button onClick={()=>setSetupPlayers(prev=>[...prev,{name:""}])} style={{width:"100%",padding:"13px",borderRadius:12,minHeight:48,border:`2px dashed ${C.sky}99`,background:`${C.sky}0a`,color:C.sky,fontSize:14,fontWeight:800,cursor:"pointer",marginTop:4}}>+ Add Player</button>
          )}
          <button onClick={createGame} disabled={playerNames.length<2} style={{...btnStyle(playerNames.length<2?"#ddd":`linear-gradient(135deg, ${C.coral}, ${C.pink})`),width:"100%",marginTop:20,fontSize:18,padding:"17px",borderRadius:50,letterSpacing:1,boxShadow:playerNames.length<2?"none":`0 6px 24px ${C.pink}44`,cursor:playerNames.length<2?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <IconTrain size={22} color="#fff"/> Create Game
          </button>
        </div>
      </Screen>
    );
  }

  // ── PICK NAME ──────────────────────────────────────────────────────────────
  if(screen==="pickname"){
    const playerList=gameData?.players??[];
    return(
      <Screen style={{background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${C.coral}, ${C.pink})`,padding:"calc(env(safe-area-inset-top) + 20px) 20px 56px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.12)"}}/>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:30,color:"#fff"}}>Who are you?</div>
          <div style={{color:"rgba(255,255,255,0.8)",fontSize:14,marginTop:4}}>Tap your name to join</div>
          <button onClick={copyCode} style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:14,background:"rgba(255,255,255,0.2)",border:"none",borderRadius:50,padding:"6px 14px",cursor:"pointer"}}>
            <span style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:700,letterSpacing:1}}>GAME CODE</span>
            <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:22,letterSpacing:4}}>{gameCode}</span>
            <IconCopy size={16} color={copied?"#fff":"rgba(255,255,255,0.6)"}/>
          </button>
          {copied&&<div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:6}}>Copied!</div>}
        </div>
        <div style={{margin:"-26px 14px 0",background:"#fff",borderRadius:22,padding:"24px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
          {playerList.map((name,i)=>(
            <button key={name} onClick={()=>{setMyName(name);setScreen("scorecard");}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",marginBottom:10,borderRadius:16,border:`2px solid ${C.sky}33`,background:`${C.sky}08`,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left"}}>
              <Avatar name={name} idx={i} size={44}/>
              <div style={{fontWeight:800,fontSize:18,color:C.dark}}>{name}</div>
              <div style={{marginLeft:"auto",color:C.sky,fontSize:13,fontWeight:700}}>That's me →</div>
            </button>
          ))}
          <div style={{marginTop:16,padding:"12px 16px",background:"#f7f8fa",borderRadius:12,fontSize:12,color:C.muted,textAlign:"center",lineHeight:1.5}}>
            Share code <strong style={{color:C.dark}}>{gameCode}</strong> so others can join from their phone
          </div>
        </div>
      </Screen>
    );
  }

  // ── SCORECARD ──────────────────────────────────────────────────────────────
  if(screen==="scorecard"&&gameData){
    const rank=ranked();
    return(
      <Screen style={{background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${C.coral}, ${C.pink})`,padding:"calc(env(safe-area-inset-top) + 24px) 20px 68px",textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-50,left:-50,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,0.1)"}}/>
          <div style={{position:"absolute",bottom:-50,right:-20,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.7)",letterSpacing:3,textTransform:"uppercase"}}>Round</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"clamp(60px,18vw,80px)",color:"#fff",lineHeight:1}}>{currentRound}</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:13}}>of {startPip}</div>
          <button onClick={copyCode} style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:10,background:"rgba(255,255,255,0.18)",border:"none",borderRadius:50,padding:"6px 16px",cursor:"pointer"}}>
            <span style={{color:"rgba(255,255,255,0.7)",fontSize:10,fontWeight:700,letterSpacing:1}}>CODE</span>
            <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:18,letterSpacing:3}}>{gameCode}</span>
            <IconCopy size={13} color={copied?"#fff":"rgba(255,255,255,0.6)"}/>
          </button>
        </div>
        <div style={{display:"flex",justifyContent:"center",marginTop:-34,marginBottom:12,position:"relative",zIndex:2}}>
          <div style={{background:"#fff",borderRadius:18,padding:"10px 18px",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
            <Domino value={Math.min(currentRound,12)} size={60}/>
          </div>
        </div>
        <div style={{padding:"0 12px",paddingBottom:"calc(100px + env(safe-area-inset-bottom))"}}>
          {rank.map((name,i)=>{
            const total=getTotal(name),wins=getWins(name);
            const hasScore=scores[name]?.[String(roundIdx)]!=null;
            const gap=total-getTotal(rank[0]);
            const isMe=name===myName;
            return(
              <div key={name} style={{background:"#fff",borderRadius:20,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:isMe?`0 4px 20px ${C.sky}33`:i===0?`0 4px 20px ${C.coral}22`:"0 2px 10px rgba(0,0,0,0.05)",border:isMe?`2px solid ${C.sky}55`:i===0?`2px solid ${C.coral}33`:"2px solid transparent"}}>
                <div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:i===0?C.coral:"#bbb",width:26,flexShrink:0}}>{i+1}</div>
                <Avatar name={name} idx={players.indexOf(name)} size={46}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:17,color:C.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {name} {isMe&&<span style={{fontSize:12,color:C.sky,fontWeight:700}}>(you)</span>}
                  </div>
                  <div style={{fontSize:11,marginTop:3,display:"flex",gap:5,flexWrap:"wrap"}}>
                    <Badge label={`${wins}W`} bg={C.lime}/>
                    {i===0?<Badge label={<span style={{display:"flex",alignItems:"center",gap:4}}><IconTrophy size={11} color={C.dark}/>Leading</span>} bg={C.gold}/>:gap>0?<Badge label={`+${gap}`} bg="#f0f0f0"/>:null}
                  </div>
                </div>
                <div style={{fontFamily:"'Fredoka One',cursive",fontSize:32,color:C.dark,flexShrink:0}}>{total}</div>
                {hasScore
                  ? isMe
                    ? <button onClick={()=>{
                        setSelected({});setCameraMode(false);setCameraScore(null);
                        setEditingRound(currentRound);
                        setScreen("counter");
                      }} style={{background:`${C.teal}18`,border:`1.5px solid ${C.teal}55`,borderRadius:10,padding:"7px 11px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                        <span style={{fontSize:16,color:C.teal}}>✓</span>
                        <span style={{fontSize:11,color:C.teal,fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>Edit</span>
                      </button>
                    : <div style={{fontSize:22,color:C.teal,flexShrink:0}}>✓</div>
                  :isMe
                    ?<button onClick={()=>{setSelected({});setCameraMode(false);setCameraScore(null);setEditingRound(null);setScreen("counter");}} style={{...btnStyle(`linear-gradient(135deg, ${C.sky}, ${C.teal})`),padding:"10px 14px",fontSize:13,borderRadius:12,flexShrink:0}}>SCORE</button>
                    :<div style={{fontSize:12,color:"#ccc",fontWeight:600,flexShrink:0}}>waiting…</div>
                }
              </div>
            );
          })}
        </div>
        <BottomBar>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setScreen("fullboard")} style={{flex:1,padding:"14px",borderRadius:14,border:"2px solid #e8e8e8",background:"#fff",color:C.dark,fontWeight:800,fontSize:14,cursor:"pointer",minHeight:48,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <IconGrid size={18} color={C.dark}/> Scoreboard
            </button>
            <button onClick={()=>setScreen("splash")} style={{padding:"14px 16px",borderRadius:14,border:"2px solid #e8e8e8",background:"#fff",color:C.coral,fontWeight:800,fontSize:13,cursor:"pointer",minHeight:48,display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap"}}>
              <IconRefresh size={16} color={C.coral}/> Leave
            </button>
          </div>
        </BottomBar>
      </Screen>
    );
  }

  // ── COUNTER ────────────────────────────────────────────────────────────────
  if(screen==="counter"&&gameData){
    const targetRound = editingRound !== null ? editingRound : currentRound;
    const existingScore = editingRound !== null ? getRound(myName, editingRound) : null;
    const score=cameraScore!==null?cameraScore:calcScore();
    const tiles=Array.from({length:startPip+1},(_,i)=>i);
    const pIdx=players.indexOf(myName);
    return(
      <Screen style={{background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${AVATAR_BG[pIdx%AVATAR_BG.length]}cc, ${C.coral})`,padding:"calc(env(safe-area-inset-top) + 18px) 18px 18px",display:"flex",alignItems:"center",gap:13}}>
          <button onClick={()=>{setEditingRound(null);setScreen("scorecard");}} style={{background:"rgba(255,255,255,0.22)",border:"none",color:"#fff",width:40,height:40,borderRadius:"50%",fontSize:18,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <Avatar name={myName} idx={pIdx} size={48}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
              Round {targetRound} · scoring for
              {editingRound!==null&&<span style={{background:"rgba(255,255,255,0.25)",borderRadius:50,padding:"2px 8px",fontSize:10,fontWeight:800,letterSpacing:0.5}}>EDITING</span>}
            </div>
            <div style={{color:"#fff",fontWeight:900,fontSize:20,fontFamily:"'Fredoka One',cursive",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{myName}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {editingRound!==null&&existingScore!==null&&<div style={{color:"rgba(255,255,255,0.55)",fontSize:10,fontWeight:700,textDecoration:"line-through"}}>{existingScore}</div>}
            <div style={{color:"rgba(255,255,255,0.65)",fontSize:10,fontWeight:700}}>PIPS</div>
            <div style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:"clamp(38px,11vw,52px)",lineHeight:1}}>{score}</div>
          </div>
        </div>
        <div style={{display:"flex",margin:"12px 12px 0",background:"#fff",borderRadius:14,padding:4,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
          {[["Tap Tiles",false],["Camera AI",true]].map(([label,cam])=>(
            <button key={label} onClick={()=>{setCameraMode(cam);if(!cam)setCameraScore(null);}} style={{flex:1,padding:"11px 0",borderRadius:11,border:"none",cursor:"pointer",minHeight:46,background:cameraMode===cam?`linear-gradient(135deg, ${C.coral}, ${C.pink})`:"transparent",color:cameraMode===cam?"#fff":C.muted,fontWeight:800,fontSize:"clamp(13px,3.5vw,15px)",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              {cam?<IconCamera size={18} color={cameraMode===cam?"#fff":C.muted}/>:<IconFinger size={18} color={cameraMode===cam?"#fff":C.muted}/>}
              {label}
            </button>
          ))}
        </div>
        {cameraMode&&(
          <div style={{margin:"12px 12px 0",background:"#fff",borderRadius:20,padding:20,textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><IconCamera size={48} color={C.teal}/></div>
            <div style={{fontWeight:800,color:C.dark,marginBottom:6,fontSize:16}}>Photo your remaining tiles</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:16}}>AI will count all the pips automatically</div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current.click()} style={{...btnStyle(`linear-gradient(135deg, ${C.sky}, ${C.teal})`),width:"100%",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <IconCamera size={20} color="#fff"/> Take Photo
            </button>
            {cameraLoading&&<div style={{marginTop:16,color:C.teal,fontWeight:700,fontSize:15}}>Counting pips…</div>}
            {cameraError&&<div style={{marginTop:12,color:C.coral,fontSize:13,fontWeight:700}}>{cameraError}</div>}
            {cameraScore!==null&&(
              <div style={{marginTop:14,padding:"14px 16px",background:`${C.lime}33`,borderRadius:14}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:800,textTransform:"uppercase",letterSpacing:1}}>AI Counted</div>
                <div style={{fontFamily:"'Fredoka One',cursive",fontSize:56,color:C.teal,lineHeight:1}}>{cameraScore}</div>
                <div style={{fontSize:12,color:C.muted}}>pips total</div>
              </div>
            )}
          </div>
        )}
        {!cameraMode&&(
          <div style={{margin:"12px 12px 0",background:"#fff",borderRadius:20,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,textAlign:"center",textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}}>Tap to add · tap again to increase count · tap at 13 to reset</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(70px, 1fr))",gap:8,justifyItems:"center"}}>
              {tiles.map(val=>(
                <Domino key={val} value={val} size={70}
                  selected={(selected[val]||0)>0}
                  count={selected[val]||0}
                  onClick={()=>toggleDomino(val)}
                />
              ))}
            </div>
            {Object.entries(selected).some(([,c])=>c>0)&&(
              <div style={{marginTop:12,padding:"9px 14px",background:"#f7f8fa",borderRadius:10,fontSize:13,color:C.muted,textAlign:"center"}}>
                {Object.entries(selected).filter(([,c])=>c>0).map(([v,c])=>`${c}×[${Number(v)===0?"50pts":v}]`).join(" + ")} = <strong style={{color:C.dark}}>{score}</strong>
              </div>
            )}
          </div>
        )}
        <BottomBar>
          <div style={{background:"#fff",borderRadius:18,padding:"12px 14px",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",boxSizing:"border-box",width:"100%"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Round Score</div>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:C.dark,lineHeight:1}}>{score}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setSelected({})} style={{flex:1,padding:"14px 0",borderRadius:50,border:"none",background:"#f0f0f0",color:C.muted,fontSize:14,fontWeight:800,fontFamily:"'Nunito',sans-serif",cursor:"pointer"}}>CLEAR</button>
              <button onClick={()=>submitScore(score)} style={{flex:2,padding:"14px 0",borderRadius:50,border:"none",background:`linear-gradient(135deg, ${C.coral}, ${C.pink})`,color:"#fff",fontSize:16,fontWeight:800,fontFamily:"'Nunito',sans-serif",cursor:"pointer",boxShadow:`0 6px 22px ${C.pink}44`,letterSpacing:1}}>{editingRound!==null?"UPDATE":"SUBMIT"}</button>
            </div>
          </div>
        </BottomBar>
      </Screen>
    );
  }

  // ── GAME OVER ──────────────────────────────────────────────────────────────
  if(screen==="gameover"&&gameData){
    const rank=ranked();
    return(
      <Screen style={{background:`linear-gradient(160deg, ${C.dark} 0%, #2a1a3a 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:8}}>🎉</div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:38,color:C.gold,lineHeight:1,marginBottom:4}}>Game Over!</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:16,marginBottom:32}}>Final Results</div>
        {rank.map((name,i)=>(
          <div key={name} style={{width:"100%",maxWidth:360,display:"flex",alignItems:"center",gap:14,padding:"14px 18px",marginBottom:10,borderRadius:20,background:i===0?"rgba(255,215,0,0.15)":"rgba(255,255,255,0.07)",border:i===0?`2px solid ${C.gold}44`:"1px solid rgba(255,255,255,0.09)"}}>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:28,color:i===0?C.gold:"rgba(255,255,255,0.3)",width:32}}>{i===0?"🏆":i+1}</div>
            <Avatar name={name} idx={players.indexOf(name)} size={44}/>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{color:"#fff",fontWeight:800,fontSize:17}}>{name}{name===myName&&<span style={{color:C.sky,fontSize:12}}> (you)</span>}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>{getWins(name)} rounds won</div>
            </div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:32,color:i===0?C.gold:"#fff"}}>{getTotal(name)}</div>
          </div>
        ))}
        <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:360,marginTop:24}}>
          <button onClick={()=>setScreen("fullboard")} style={{...btnStyle("rgba(255,255,255,0.12)"),fontSize:16,padding:"16px",borderRadius:50,border:"1px solid rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <IconGrid size={18} color="#fff"/> Full Scoreboard
          </button>
          <button onClick={()=>{setGameData(null);setGameCode("");setMyName("");setScreen("splash");}} style={{...btnStyle(`linear-gradient(135deg, ${C.coral}, ${C.pink})`),fontSize:16,padding:"16px",borderRadius:50,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <IconTrain size={18} color="#fff"/> New Game
          </button>
        </div>
      </Screen>
    );
  }

  // ── FULL SCOREBOARD ────────────────────────────────────────────────────────
  if(screen==="fullboard"&&gameData){
    const rank=ranked();
    const roundPips=Array.from({length:startPip+1},(_,i)=>startPip-i);
    const grandTotal=players.reduce((s,n)=>s+getTotal(n),0);
    return(
      <Screen style={{background:C.dark}}>
        <div style={{padding:"calc(env(safe-area-inset-top) + 18px) 16px 16px",display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>setScreen(gameData.status==="done"?"gameover":"scorecard")} style={{background:"rgba(255,255,255,0.09)",border:"none",color:"#fff",width:40,height:40,borderRadius:"50%",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:26}}>Full Scoreboard</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:12}}>Double-{startPip} · {players.length} players · Code: {gameCode}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:10}}>ROUND</div>
            <div style={{fontFamily:"'Fredoka One',cursive",color:C.coral,fontSize:28}}>{currentRound}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,padding:"4px 12px 12px",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {rank.map((name,i)=>{
            const total=getTotal(name),wins=getWins(name),leader=getTotal(rank[0]);
            return(
              <div key={name} style={{minWidth:120,borderRadius:18,padding:"12px 14px",flexShrink:0,background:i===0?`linear-gradient(135deg, ${C.coral}, ${C.pink})`:"rgba(255,255,255,0.07)",border:i===0?"none":"1px solid rgba(255,255,255,0.09)"}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                  <Avatar name={name} idx={players.indexOf(name)} size={28}/>
                  <span style={{color:"#fff",fontWeight:800,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:70}}>{name}</span>
                </div>
                <div style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:32,lineHeight:1}}>{total}</div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,marginTop:4}}>{wins}W · {i===0?"Leader":`+${total-leader}`}</div>
              </div>
            );
          })}
        </div>
        <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",padding:"0 12px 12px"}}>
          <table style={{borderCollapse:"collapse",background:"rgba(255,255,255,0.03)",borderRadius:16,overflow:"hidden",width:"max-content",minWidth:"100%"}}>
            <thead>
              <tr>
                <th style={{padding:"9px 12px",textAlign:"left",color:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1,background:"rgba(255,255,255,0.07)",whiteSpace:"nowrap",position:"sticky",left:0,zIndex:2}}>Player</th>
                {roundPips.map(pip=><th key={pip} style={{padding:"9px 5px",textAlign:"center",color:pip===currentRound?C.gold:"rgba(255,255,255,0.3)",fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.07)",minWidth:30}}>{pip}</th>)}
                <th style={{padding:"9px 7px",textAlign:"center",color:C.coral,fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.07)"}}>RK</th>
                <th style={{padding:"9px 7px",textAlign:"center",color:"#fff",fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.07)"}}>TOT</th>
                <th style={{padding:"9px 7px",textAlign:"center",color:C.lime,fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.07)"}}>W</th>
              </tr>
            </thead>
            <tbody>
              {players.map((name,pi)=>{
                const total=getTotal(name),wins=getWins(name),rk=ranked().indexOf(name)+1;
                const leader=getTotal(ranked()[0]),toFirst=total-leader;
                return(
                  <tr key={name} style={{background:pi%2===0?"rgba(255,255,255,0.025)":"transparent"}}>
                    <td style={{padding:"9px 12px",whiteSpace:"nowrap",position:"sticky",left:0,background:pi%2===0?"#1e1e30":"#1a1a2e",zIndex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <Avatar name={name} idx={players.indexOf(name)} size={26}/>
                        <span style={{color:name===myName?C.sky:"#fff",fontWeight:700,fontSize:13}}>{name}</span>
                      </div>
                    </td>
                    {roundPips.map(pip=>{
                      const s=getRound(name,pip),isWin=s===0,isMyScore=name===myName&&s!==null;
                      return(
                        <td key={pip} style={{padding:"7px 3px",textAlign:"center"}}>
                          {s!==null
                            ?<div
                                onClick={isMyScore?()=>{setSelected({});setCameraMode(false);setCameraScore(null);setEditingRound(pip);setScreen("counter");}:undefined}
                                style={{display:"inline-block",minWidth:26,padding:"2px 3px",borderRadius:5,background:isWin?C.gold:"transparent",color:isWin?C.dark:"rgba(255,255,255,0.8)",fontWeight:isWin?900:400,fontSize:13,cursor:isMyScore?"pointer":"default",textDecoration:isMyScore&&!isWin?"underline dotted rgba(255,255,255,0.3)":"none"}}
                              >{s}</div>
                            :<span style={{color:"rgba(255,255,255,0.15)",fontSize:11}}>–</span>
                          }
                        </td>
                      );
                    })}
                    <td style={{padding:"7px 6px",textAlign:"center",fontFamily:"'Fredoka One',cursive",color:rk===1?C.gold:C.coral,fontSize:16}}>{rk}</td>
                    <td style={{padding:"7px 6px",textAlign:"center",fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:18}}>{total}</td>
                    <td style={{padding:"7px 6px",textAlign:"center",color:C.lime,fontWeight:800,fontSize:13}}>{wins}</td>
                  </tr>
                );
              })}
              <tr style={{borderTop:"1px solid rgba(255,255,255,0.09)"}}>
                <td style={{padding:"8px 12px",color:"rgba(255,255,255,0.3)",fontSize:11,fontWeight:800,position:"sticky",left:0,background:"#1a1a2e"}}>TOTAL</td>
                {roundPips.map(pip=>{
                  const s=players.reduce((sum,n)=>sum+(getRound(n,pip)||0),0);
                  const hasAny=players.some(n=>getRound(n,pip)!==null);
                  return<td key={pip} style={{padding:"7px 3px",textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:11}}>{hasAny?s:""}</td>;
                })}
                <td colSpan={2}/>
                <td style={{padding:"7px 6px",textAlign:"center",color:"rgba(255,255,255,0.4)",fontWeight:800,fontSize:13}}>{grandTotal}</td>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>
      </Screen>
    );
  }

  // ── RULES ──────────────────────────────────────────────────────────────────
  if(screen==="rules"){
    const sections=[
      {title:"Objective",text:"Be the player with the lowest score when the game ends. Each round, you score the total pips on tiles left in your hand."},
      {title:"Setup",text:"Shuffle all dominoes face down. Each player draws tiles based on player count. The remaining tiles form the 'boneyard'. Place the starting double (e.g. 12-12) face up in the center hub."},
      {title:"Starting the Game",text:"The player with the highest double places it in the center. Each player must start their personal train by playing off that double. If a player cannot start their train, they draw from the boneyard until they can."},
      {title:"Taking a Turn",text:"On your turn you must play a tile on your own train, the Mexican Train, or any open (public) train. If you cannot play, draw one tile from the boneyard. If you still can't play, place a marker on your train making it public."},
      {title:"The Mexican Train",text:"Anyone can start or add to the Mexican Train, which also branches off the center hub. It is always public."},
      {title:"Going Out",text:"Play your last tile to go out. All other players count the pips remaining in their hand and record that as their score for the round. Playing a double-blank (0-0) scores 50 points."},
      {title:"Rounds",text:"Each round starts with the next lower double as the hub. A Double-12 game plays from 12-12 down to 0-0 for 13 rounds total. Choose 'Evens' or 'Odds' for a shorter game."},
      {title:"Winning",text:"After the final round (0-0), the player with the lowest total score wins!"},
    ];
    return(
      <Screen style={{background:C.bg}}>
        <div style={{background:`linear-gradient(135deg, ${C.sky}, ${C.teal})`,padding:"calc(env(safe-area-inset-top) + 20px) 20px 40px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",bottom:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.12)"}}/>
          <button onClick={()=>setScreen("setup")} style={{background:"rgba(255,255,255,0.22)",border:"none",color:"#fff",width:40,height:40,borderRadius:"50%",fontSize:18,cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:30,color:"#fff"}}>📋 How to Play</div>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:14,marginTop:4}}>Mexican Train Dominoes</div>
        </div>
        <div style={{padding:"16px 14px 40px"}}>
          {sections.map((s,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:16,padding:"16px 18px",marginBottom:10,boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:17,color:C.teal,marginBottom:6}}>{s.title}</div>
              <div style={{fontSize:14,color:"#444",lineHeight:1.6}}>{s.text}</div>
            </div>
          ))}
          <button onClick={()=>setScreen("setup")} style={{...btnStyle(`linear-gradient(135deg, ${C.sky}, ${C.teal})`),width:"100%",fontSize:16,padding:"16px",borderRadius:50,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:6}}>
            ← Back to Setup
          </button>
        </div>
      </Screen>
    );
  }

  // ── Loading ────────────────────────────────────────────────────────────────
  return(
    <Screen style={{background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:C.muted}}>Loading…</div>
    </Screen>
  );
}

// Mount after Firebase is ready
waitForFb(()=>{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
});
</script>
</body>
</html>
